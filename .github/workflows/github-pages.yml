name: GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pages: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static UI
    runs-on: ubuntu-latest
    # Fail fast on a hung build instead of holding the concurrency slot for the 6h default.
    # The build step retries internally (the Rolldown transform deadlocks intermittently), so allow
    # headroom for up to three 5-minute attempts plus the install/asset steps.
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Enable corepack
        run: corepack enable

      # vendor/json-url ships its dist/ gitignored, and pnpm copies file: deps into its store at
      # install time — so json-url must be built BEFORE pnpm install, otherwise the bundler can't
      # resolve @firstform/json-url and Rolldown deadlocks on the missing import (20-min hang).
      - name: Build json-url submodule
        run: pnpm run json-url:build

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Copy CAD runtime assets
        run: |
          pnpm nx run openscad:copy-assets
          pnpm nx run converter:copy-assets
          pnpm nx run runtime:copy-assets
          pnpm nx run ui:copy-assets

      - name: Set build metadata
        run: |
          echo "VITE_COMMIT_SHA=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "VITE_BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_ENV"

      - name: Build React Router app
        working-directory: apps/ui
        env:
          GITHUB_PAGES: 'true'
          TAU_API_URL: https://api.taucad.dev
          TAU_FRONTEND_URL: https://3dd.ahmadjalil.com/tau
          TAU_WEBSOCKET_URL: wss://api.taucad.dev
          VITE_COMMIT_SHA: ${{ env.VITE_COMMIT_SHA }}
          VITE_BUILD_TIME: ${{ env.VITE_BUILD_TIME }}
          # Match the canonical Nx build (apps/ui/project.json): the client bundle
          # needs >default heap, and full client source maps cause OOM/GC-thrash hangs.
          NODE_OPTIONS: '--max-old-space-size=8192'
        # The Rolldown transform intermittently deadlocks at "transforming..." (see commit a4e2af37).
        # A healthy build finishes in ~1 min, so cap each attempt at 5 min and retry up to 3 times:
        # a flaky hang is killed early and a later attempt succeeds instead of failing the deploy.
        run: |
          for attempt in 1 2 3; do
            echo "::group::React Router build attempt ${attempt}/3"
            if timeout 300 pnpm exec react-router build --sourcemapClient hidden; then
              echo "::endgroup::"
              echo "Build succeeded on attempt ${attempt}."
              exit 0
            fi
            status=$?
            echo "::endgroup::"
            echo "::warning::Build attempt ${attempt} failed or timed out (exit ${status}); retrying."
            rm -rf build
          done
          echo "::error::React Router build failed after 3 attempts."
          exit 1

      - name: Mirror public assets under /tau
        working-directory: apps/ui
        run: |
          mkdir -p build/client/tau
          cp -R build/client/android-chrome-192x192.png build/client/tau/
          cp -R build/client/android-chrome-512x512.png build/client/tau/
          cp -R build/client/apple-touch-icon.png build/client/tau/
          cp -R build/client/favicon.ico build/client/tau/
          cp -R build/client/favicon.svg build/client/tau/
          cp -R build/client/favicon-96x96.png build/client/tau/

      - name: Add custom-domain root redirect
        working-directory: apps/ui
        run: |
          cat > build/client/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <meta http-equiv="refresh" content="0; url=/tau/gallery">
              <title>Tau CAD Gallery</title>
              <script>globalThis.location.replace('/tau/gallery' + globalThis.location.search + globalThis.location.hash);</script>
            </head>
            <body>
              <a href="/tau/gallery">Open Tau CAD Gallery</a>
            </body>
          </html>
          HTML

      - name: Prepare Pages artifact
        run: |
          touch apps/ui/build/client/.nojekyll
          printf '3dd.ahmadjalil.com\n' > apps/ui/build/client/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/ui/build/client

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
