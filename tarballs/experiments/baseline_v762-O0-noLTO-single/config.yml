name: "v762-O0-noLTO-single"
description: "OCCT v7.6.2 baseline from npm replicad-opencascadejs@0.20.2, Docker default build"

compilation:
  optimization: "-O0"
  lto: false
  exceptions: "none"
  threading: "single-threaded"

linking:
  yaml: "custom_build_single.yml"
  wasmOptLevel: "-O3"

benchmark:
  iterations: 10
  filter: ["primitives", "booleans", "fillets", "extrusions", "complex", "examples", "stress"]
