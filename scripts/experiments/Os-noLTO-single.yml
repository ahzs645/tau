name: "Os-noLTO-single"
description: "Size-optimized: -Os compile, noLTO, no exceptions, single-threaded"

compilation:
  optimization: "-Os"
  lto: false
  exceptions: "none"
  threading: "single-threaded"

linking:
  yaml: "custom_build_single_v8.yml"
  wasmOptLevel: "-Oz"

benchmark:
  iterations: 10
  filter: ["primitives", "booleans", "fillets", "extrusions", "complex", "examples", "stress"]
