name: "O3-LTO-Oz-link"
description: "Max speed compile with LTO, size-optimized wasm-opt: -O3 compile, LTO, -Oz wasm-opt"

compilation:
  optimization: "-O3"
  lto: true
  exceptions: "none"
  threading: "single-threaded"

linking:
  yaml: "custom_build_single_v8.yml"
  wasmOptLevel: "-Oz"

benchmark:
  iterations: 10
  filter: ["primitives", "booleans", "fillets", "extrusions", "complex", "examples", "stress"]
