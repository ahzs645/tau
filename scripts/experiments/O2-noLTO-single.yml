name: "O2-noLTO-single"
description: "Default production build: -O2 compile, noLTO, no exceptions, single-threaded"

compilation:
  optimization: "-O2"
  lto: false
  exceptions: "none"
  threading: "single-threaded"

linking:
  yaml: "custom_build_single_v8.yml"
  wasmOptLevel: "-O3"

benchmark:
  iterations: 10
  filter: ["primitives", "booleans", "fillets", "extrusions", "complex", "examples", "stress"]
