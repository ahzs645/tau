# Netlify configuration for Tau UI (production site: `taucad-prod-us`, https://tau.new)
#
# Drives the build container only. Site-level configuration (custom_domain,
# domain_aliases, build_settings, dashboard env vars) is owned by Terraform
# in `repos/cloud-infra` (HCP workspace `tau-cloud-prod-us`) — never edit
# anything in the Netlify dashboard for this site, every property there is
# managed.
#
# `[context.production.environment]` entries below are mirrored verbatim by
# Terraform's `plain_environment_variables` map in
# `repos/cloud-infra/stacks/cloud/prod-us/terraform.auto.tfvars` with
# `functions+runtime` scope (the toml covers the build container; the
# dashboard mirror covers Functions/SSR runtime). When changing an endpoint
# URL, update BOTH this toml and the tfvars map together — HCP plan diff
# catches drift.
#
# Secrets (POSTHOG_API_KEY, SENTRY_AUTH_TOKEN, …) live in HCP workspace
# variables (Sensitive flag) and are written to Netlify via Terraform's
# `secret_environment_variables` — never in this toml, never directly in the
# Netlify dashboard.
#
# NODE_ENV is mirrored as `functions+runtime` ONLY — never `builds`. Setting
# `NODE_ENV=production` at build time makes pnpm skip devDependencies and
# breaks the Vite build. The Terraform map enforces this scope.
#
# Deployment: this config is invoked by `.github/workflows/prod-deploy-ui.yml`
# via `netlify deploy --prod --config apps/ui/netlify.prod.toml`. The
# `taucad-prod-us` site has no Git integration (Terraform creates it as a CI-only
# shell via `deploy_mode = "ci"`); manual `workflow_dispatch` is the only
# deploy path.
#
# Staging counterpart at `apps/ui/netlify.toml` (taucad site, git-driven).
# Both share `[build].command` and `[[headers]]` for security parity; only
# endpoints diverge.
#
# NX_PREFER_NODE_STRIP_TYPES: NODE_ENV=production causes pnpm to skip
# devDependencies (including @swc/core). Nx needs a TS transpiler to load
# plugin config files (e.g. playwright.config.ts) during project graph
# construction. This env var tells Nx to use Node's native type stripping
# instead of SWC/ts-node, which requires no additional packages.

[build]
# `command` and `publish` are resolved relative to the site's `base directory`
# (set to `apps/ui` by Terraform — `repos/cloud-infra/stacks/cloud/prod-us/main.tf`).
# `pnpm nx build ui` invoked from `apps/ui` still walks up to the workspace root,
# and `build/client` resolves to `apps/ui/build/client` at the repo level.
command = "NX_PREFER_NODE_STRIP_TYPES=true pnpm nx build ui"
publish = "build/client"

# Production context — the only deploy context for this site (PR previews
# and branch deploys live on the staging `taucad` site, not here).
[context.production]
command = "NX_PREFER_NODE_STRIP_TYPES=true pnpm nx build ui"
[context.production.environment]
NODE_ENV = "production"
TAU_API_URL = "https://api.tau.new"
TAU_WEBSOCKET_URL = "wss://api.tau.new"
TAU_FRONTEND_URL = "https://tau.new"

[[headers]]
for = "/*"
[headers.values]
# XSS Protection
X-XSS-Protection = "1; mode=block"
X-Content-Type-Options = "nosniff"
# Clickjacking Protection
X-Frame-Options = "DENY"
# HSTS (forces HTTPS)
Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
# Referrer Policy
Referrer-Policy = "strict-origin-when-cross-origin"
# Permissions Policy (Feature Policy)
Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), interest-cohort=()"
# Cross-Origin Policies
Cross-Origin-Opener-Policy = "same-origin"
Cross-Origin-Resource-Policy = "same-origin"
Cross-Origin-Embedder-Policy = "require-corp"
# JavaScript Profiling
Document-Policy = "js-profiling"
# Content Security Policy (CSP) - Start with report-only mode
# NOTE: Test thoroughly before switching to enforcing mode
# Remove '-Report-Only' suffix to enforce
# connect-src allowlist:
#   - 'self' covers same-origin SSR fetches (proxied PostHog at /api/ph,
#     proxied GitHub avatars at /api/github-avatar, health endpoints).
#   - https://api.zoo.dev / https://api.kittycad.io: Zoo external converter API
#     used by the @taucad/runtime transcoder pipeline (server-to-server).
#   - https://api.tau.new + wss://api.tau.new: explicit production API +
#     Socket.IO endpoint. Listed explicitly so when CSP flips to enforcing
#     (report-only first) we don't rely on the catch-all `wss:` and any unintended hop is
#     immediately reported.
Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://cdn.taucad.dev https://cdn.tau.new https:; font-src 'self' data:; connect-src 'self' https://cdn.taucad.dev https://cdn.tau.new https://api.zoo.dev https://api.kittycad.io https://api.tau.new wss://api.tau.new wss:; worker-src 'self' blob:; child-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;"

# Content-hashed Vite bundles + WASM (immutable filenames)
[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
Netlify-CDN-Cache-Control = "public, durable, max-age=31536000"

[[headers]]
for = "/fonts/*"
[headers.values]
Cache-Control = "public, max-age=2592000"
Netlify-CDN-Cache-Control = "public, durable, max-age=2592000"

[[headers]]
for = "/*.svg"
[headers.values]
Cache-Control = "public, max-age=86400"
Netlify-CDN-Cache-Control = "public, durable, max-age=86400"
